<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .dice {
      display: inline-block;
      width: 200px;
      height: 200px;
      background: linear-gradient(45deg, white, #ccc);
      border: 2px solid;
      border-radius: 20px;
      box-shadow: 5px 5px 10px 0px #0008;
      position: relative;
    }

    .dot {
      width: 20%;
      height: 20%;
      background: black;
      border-radius: 50%;
      position: absolute;
    }

    .red {
      background: red;
    }

    .at1 {
      left: 10%;
      top: 10%;
    }

    .at3 {
      right: 10%;
      top: 10%;
    }

    .at4 {
      left: 10%;
      top: 50%;
      transform: translateY(-20px);
    }

    .at5 {
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .at6 {
      right: 10%;
      top: 50%;
      transform: translateY(-50%);
    }

    .at7 {
      left: 10%;
      bottom: 10%;
    }

    .at9 {
      right: 10%;
      bottom: 10%;
    }
  </style>
</head>

<body>
  <div class="dice">
    <div class="red dot at5"></div>
  </div>
  <div class="dice">
    <div class="dot at1"></div>
    <div class="dot at9"></div>
  </div>
  <div class="dice">
    <div class="dot at1"></div>
    <div class="dot at5"></div>
    <div class="dot at9"></div>
  </div>
  <div class="dice">
    <div class="dot at1"></div>
    <div class="dot at3"></div>
    <div class="dot at7"></div>
    <div class="dot at9"></div>
  </div>
  <div class="dice">
    <div class="dot at1"></div>
    <div class="dot at3"></div>
    <div class="dot at5"></div>
    <div class="dot at7"></div>
    <div class="dot at9"></div>
  </div>
  <div class="dice">
    <div class="dot at1"></div>
    <div class="dot at3"></div>
    <div class="dot at4"></div>
    <div class="dot at6"></div>
    <div class="dot at7"></div>
    <div class="dot at9"></div>
  </div>
</body>

</html>
