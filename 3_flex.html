<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
      background-color: lightgoldenrodyellow;
      /* width: 100%; */
      height: 800px;
      display: flex;
      /* 设置主轴的方向順序為何*/
      flex-direction: row;
      /* 是否換行 */
      flex-wrap: wrap-reverse;
      /* 多行的分配方式 */
      /* ============== */
      /* 等價 flex-direction + flex-wrap */
      /* flex-flow: row wrap; */
      /* ============== */
      /* gap: 10px; */
      /* align-content: flex-start; */
      /* 主軸的分配方式 */
      justify-content: flex-start;
      /* 交軸的分配方式 */
      align-items: flex-start;

      /* 撐滿容器 */
      .item {
        width: 100px;
        height: 100px;
        background-color: lightblue;
        border: 1px solid black;
        margin: 10px;
        padding: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <span class="item" style="width: 100px; height: 100px;">AAAAAA</span>
    <span class="item">BCCC<br>CCCCCC</span>
    <span class="item">CCCC</span>
    <span class="item" style="width: 100px; height: 100px;">D</span>
    <span class="item">E</span>
    <span class="item">F</span>
  </div>
</body>

</html>
