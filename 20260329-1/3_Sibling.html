<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* ~ 通用兄弟選擇，排在 後面所有的兄弟 */
    ul li {
      color: red;
    }

    ul li~li {
      color: blue;
    }

    h2~h3 {
      color: green;
    }

    /* + 直接兄弟選擇，排在後面第一個兄弟 */
    li+li {
      background-color: purple;
    }

    div+h3 {
      background-color: yellow;
    }

    .loki+.max {
      color: red;
    }
  </style>
</head>

<body>
  <ul>
    <li>001</li>
    <li>002</li>
    <li>003</li>
  </ul>
  <div>
    <h1>h1 This is a heading inside a div.</h1>
    <h2>h2 This is a heading inside a div.</h2>
    <div>123</div>
    <div class="loki">123</div>
    <h3 class="max">h3 This is a heading inside a div.</h3>
    <h3>h3 This is a heading inside a div.</h3>
    <h3>h3 This is a heading inside a div.</h3>
    <h4>h4 This is a heading inside a div.</h4>
  </div>
</body>

</html>
