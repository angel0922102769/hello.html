<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    section.think {
      .parent {
        color: purple;
      }

      .child {
        color: inherit;
      }

      div .child {
        color: blue;
      }
    }
  </style>
</head>

<body>
  <section class="think">
    <div class="parent" style="color: green;">
      <p class="child">這段文字是什麼顏色？</p>
    </div>
  </section>
</body>

</html>
