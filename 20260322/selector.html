<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Color 練習</title>
  <style>
    /* 用元素來選擇 */
    h1 {
      color: red;
    }
    .one  {
      color: blue;
    }
    .two  {
      color: hsl(330, 100%, 50%);
    }
     .head-line {
      color: hsl(103, 100%, 50%);
    }

  </style>
</head>
<body>
  <h1>主標題</h1>
  <h2 class="head-line">次標題</h2>
  <p class="one">這是第一個段落，用來測試 CSS 的 color 屬性。</p>
  <p class="two">這是第二個段落，我們會用它來學習不同的選擇器。</p>
  <div>這是一個 div 區塊元素。</div>
  <span>這是一個 span 行內元素。</span>
</body>
</html>
