<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Color 練習</title>
  <style>
    /* 在這裡寫入你的 CSS 練習代碼 
    選擇器:selector
    屬性:key 值;value;
    */
    h1
    {
      color: red;
    }
    p,div
    {
      color: blue;
    }
    p {
        color: rgb(0, 0, 0);
        color: rgba(255, 0, 0, 0.5);
       /* color: rgb(128, 128, 128);    /* 中灰 */
    }
    div {
        background-color: rgb(255, 255, 138, 0.5);    
    }

  </style>
</head>
<body>
  <h1>主標題</h1>
  <h2>次標題</h2>
  <p>這是第一個段落，用來測試 CSS 的 color 屬性。</p>
  <p>這是第二個段落，我們會用它來學習不同的選擇器。</p>
  <div>這是一個 div 區塊元素。</div>
  <span>這是一個 span 行內元素。</span>
</body>
</html>
