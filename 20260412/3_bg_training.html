<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 基礎樣式 */
    body {
      text-align: center;
      font-family: "Microsoft JhengHei", sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
    }

    table {
      margin: 1rem auto;
      border-collapse: separate;
      border-spacing: 8px;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    table td {
      width: 200px;
      height: 200px;
      border: 2px solid #ddd;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }

    /* 在這裡完成各個格子的背景效果 */
    /* "https://picsum.photos/50/50/?random=10" */
    /* "https://picsum.photos/200/50/?random=10" */
    /* "https://picsum.photos/200/100/?random=10" */
    .a {
      background: crimson;
    }

    .b {
      background: url("https://picsum.photos/50/50/?random=10") center / cover;
    }

    .c {
      background: url("https://picsum.photos/50/50/?random=10") repeat-x;
    }

    .d {
      background: url("https://picsum.photos/50/50/?random=10") repeat-y;
    }

    .e {
      background: url("https://picsum.photos/50/50/?random=10") no-repeat center;
    }

    .f {
      background: lightgoldenrodyellow url("https://picsum.photos/50/50/?random=10") no-repeat center;
    }

    .g {
      background:
        url("https://picsum.photos/200/50/?random=10") no-repeat top,
        url("https://picsum.photos/200/100/?random=10") no-repeat center,
        url("https://picsum.photos/200/50/?random=10") no-repeat bottom;
    }

    .h {
      background: linear-gradient(90deg, black, blue);
    }

    .i {
      background: radial-gradient(black, white);
    }
  </style>
</head>

<body>
  <table>
    <tr>
      <td class="a"></td>
      <td class="b">
      </td>
      <td class="c"></td>
    </tr>
    <tr>
      <td class="d"></td>
      <td class="e"></td>
      <td class="f"></td>
    </tr>
    <tr>
      <td class="g"></td>
      <td class="h"></td>
      <td class="i"></td>
    </tr>
  </table>
</body>

</html>
